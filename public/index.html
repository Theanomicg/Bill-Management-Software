<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Maker System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-bg"></div>
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Bill Maker System</p>
            <h1>Fast Billing For Everyday Shops</h1>
            <p>Create invoices, apply optional GST, print/export PDFs, and manage invoice history from one panel.</p>
        </header>

        <section class="layout-grid">
            <article class="panel">
                <div class="panel-heading">
                    <h2>Create Invoice</h2>
                    <span id="formModeBadge" class="badge">New</span>
                </div>

                <div class="field-group">
                    <label for="shopName">Shop Name</label>
                    <input id="shopName" type="text" placeholder="Your Shop Name" value="Bill Maker Store">
                </div>

                <div class="item-entry">
                    <div class="field-group">
                        <label for="name">Item Name</label>
                        <input id="name" type="text" placeholder="Item name">
                    </div>
                    <div class="field-group small">
                        <label for="quantity">Qty</label>
                        <input id="quantity" type="number" min="1" step="1" placeholder="0">
                    </div>
                    <div class="field-group small">
                        <label for="price">Unit Price</label>
                        <input id="price" type="number" min="0" step="0.01" placeholder="0.00">
                    </div>
                    <button id="addItemBtn" class="btn primary">Add Item</button>
                </div>

                <div class="table-wrap">
                    <table id="itemsTable">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Qty</th>
                                <th>Unit Price</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="controls-row">
                    <label class="check-wrap">
                        <input id="applyTax" type="checkbox" checked>
                        Apply GST
                    </label>
                    <div class="field-group inline">
                        <label for="taxRate">GST %</label>
                        <input id="taxRate" type="number" min="0" step="0.1" value="5">
                    </div>
                </div>

                <div class="summary-card">
                    <p id="subtotal">Subtotal: Rs 0.00</p>
                    <p id="tax">Tax: Rs 0.00</p>
                    <h3 id="total">Total: Rs 0.00</h3>
                </div>

                <div class="action-row">
                    <button id="saveInvoiceBtn" class="btn accent">Save Invoice</button>
                    <button id="printLatestBtn" class="btn ghost">Print Latest</button>
                    <button id="clearBtn" class="btn ghost">Clear</button>
                </div>
                <p id="statusMessage" class="status" aria-live="polite"></p>
            </article>

            <article class="panel">
                <div class="panel-heading">
                    <h2>Invoice History</h2>
                </div>

                <div class="history-filters">
                    <div class="field-group">
                        <label for="searchInput">Search (Invoice # or Date)</label>
                        <input id="searchInput" type="text" placeholder="e.g. 12 or 2026-03-04">
                    </div>
                    <div class="field-group">
                        <label for="dateFilter">Filter by Date</label>
                        <input id="dateFilter" type="date">
                    </div>
                    <button id="searchBtn" class="btn primary">Search</button>
                    <button id="resetFilterBtn" class="btn ghost">Reset</button>
                </div>

                <div class="table-wrap history-table">
                    <table id="historyTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Date</th>
                                <th>Total</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </article>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
